<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DockShield Render Test</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>*{margin:0;padding:0}body{background:#000;overflow:hidden}canvas{display:block}
#info{position:fixed;top:10px;left:10px;color:#0f0;font:14px monospace;z-index:10;background:rgba(0,0,0,0.7);padding:10px;border-radius:8px}
</style></head><body>
<div id="info">Loading...</div>
<script>
try {
  const info = document.getElementById('info');
  info.textContent = 'Creating renderer...';
  
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a1628);
  scene.fog = new THREE.Fog(0x0a1628, 100, 500);
  
  const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0, 15, 30);
  camera.lookAt(0, 0, 0);
  
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);
  
  info.textContent = 'Adding lights...';
  scene.add(new THREE.AmbientLight(0x404060, 0.6));
  const sun = new THREE.DirectionalLight(0xffeedd, 1.2);
  sun.position.set(50, 100, 50);
  scene.add(sun);
  
  info.textContent = 'Creating water...';
  // SIMPLE water — no shaders, just MeshStandardMaterial
  const waterGeo = new THREE.PlaneGeometry(400, 400, 40, 40);
  const waterMat = new THREE.MeshStandardMaterial({ 
    color: 0x0a3050, roughness: 0.3, metalness: 0.6,
    transparent: true, opacity: 0.9
  });
  const water = new THREE.Mesh(waterGeo, waterMat);
  water.rotation.x = -Math.PI / 2;
  scene.add(water);
  
  info.textContent = 'Creating boat...';
  // Simple boat — no ExtrudeGeometry, just boxes
  const boat = new THREE.Group();
  const hull = new THREE.Mesh(
    new THREE.BoxGeometry(2, 1, 5),
    new THREE.MeshStandardMaterial({ color: 0xe0e0e0 })
  );
  hull.position.y = 0.5;
  boat.add(hull);
  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(1.5, 0.8, 2),
    new THREE.MeshStandardMaterial({ color: 0x0ea5e9 })
  );
  cabin.position.set(0, 1.2, -0.5);
  boat.add(cabin);
  boat.position.set(0, 0.3, 10);
  scene.add(boat);
  
  info.textContent = 'Creating dock...';
  // Dock
  const dock = new THREE.Mesh(
    new THREE.BoxGeometry(8, 0.4, 12),
    new THREE.MeshStandardMaterial({ color: 0x8B6914 })
  );
  dock.position.set(0, 0.3, -30);
  scene.add(dock);
  
  // Red pin
  const pin = new THREE.Mesh(
    new THREE.SphereGeometry(1.5, 8, 8),
    new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.5 })
  );
  pin.position.set(0, 8, -30);
  scene.add(pin);
  
  // Green beacon light
  const beacon = new THREE.PointLight(0x10b981, 2, 40);
  beacon.position.set(0, 3, -30);
  scene.add(beacon);
  
  info.textContent = 'Creating obstacles...';
  // Stumps
  for (let i = 0; i < 20; i++) {
    const s = new THREE.Mesh(
      new THREE.CylinderGeometry(0.4, 0.6, 1.5, 6),
      new THREE.MeshStandardMaterial({ color: 0x3a2a1a })
    );
    s.position.set((Math.random()-0.5)*80, 0, -Math.random()*50 - 5);
    scene.add(s);
  }
  
  // Input
  const keys = {};
  let speed = 0;
  document.addEventListener('keydown', e => keys[e.code] = true);
  document.addEventListener('keyup', e => keys[e.code] = false);
  
  info.textContent = 'Starting render loop...';
  let frameCount = 0;
  
  function animate() {
    requestAnimationFrame(animate);
    frameCount++;
    
    // Simple water wave animation (vertex displacement)
    const t = Date.now() * 0.001;
    const pos = waterGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i), y = pos.getY(i);
      pos.setZ(i, Math.sin(x * 0.05 + t) * 0.3 + Math.cos(y * 0.07 + t * 0.8) * 0.2);
    }
    pos.needsUpdate = true;
    waterGeo.computeVertexNormals();
    
    // Boat physics
    if (keys.ArrowUp || keys.KeyW) speed = Math.min(speed + 0.01, 0.8);
    if (keys.ArrowDown || keys.KeyS) speed -= 0.005;
    speed *= 0.985;
    if (Math.abs(speed) > 0.02) {
      if (keys.ArrowLeft || keys.KeyA) boat.rotation.y += 0.03;
      if (keys.ArrowRight || keys.KeyD) boat.rotation.y -= 0.03;
    }
    const dir = new THREE.Vector3(0, 0, -1);
    dir.applyAxisAngle(new THREE.Vector3(0, 1, 0), boat.rotation.y);
    boat.position.addScaledVector(dir, speed);
    boat.position.y = 0.3 + Math.sin(t * 2) * 0.15;
    
    // Camera follow
    const camTarget = boat.position.clone().add(
      new THREE.Vector3(0, 12, 18).applyAxisAngle(new THREE.Vector3(0, 1, 0), boat.rotation.y)
    );
    camera.position.lerp(camTarget, 0.08);
    camera.lookAt(boat.position);
    
    renderer.render(scene, camera);
    
    if (frameCount % 60 === 0) {
      const dist = boat.position.distanceTo(dock.position).toFixed(0);
      info.textContent = `FPS: ~60 | Speed: ${(speed*40).toFixed(1)} kn | Dock: ${dist}m | WASD to move`;
    }
  }
  animate();
  
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
  
} catch(e) {
  document.getElementById('info').textContent = 'ERROR: ' + e.message;
  document.getElementById('info').style.color = '#f00';
}
</script>
</body></html>
